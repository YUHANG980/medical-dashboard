server:
  port: 8090

spring:
  datasource:
    url: jdbc:mysql://hadoop100:3306/medical_dashboard?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000

mybatis-plus:
  # 实体类包路径
  type-aliases-package: com.medical.dashboard.entity
  # Mapper XML 位置
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 驼峰命名自动映射（数据库下划线 → Java 驼峰）
    map-underscore-to-camel-case: true
    # SQL 日志（开发调试用）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键自增
      id-type: auto
      # 逻辑删除（本系统不需要，保留默认）

# 日志级别
logging:
  level:
    com.medical.dashboard: debug
